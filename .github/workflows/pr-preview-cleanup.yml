name: PR preview cleanup

on:
  pull_request:
    branches: [main]
    types: [closed]

# When a PR is closed (merged or not), remove its preview directory from
# the gh-pages branch so previews don't accumulate forever.
permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Remove preview directory
        run: |
          DIR="pr-${{ github.event.pull_request.number }}"
          if [ -d "$DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git rm -rf "$DIR"
            git commit -m "preview: remove pr-${{ github.event.pull_request.number }}"
            git push
          else
            echo "No preview directory $DIR — nothing to remove."
          fi

      - name: Update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            ### 🧹 Preview removed

            The PR preview was deleted because this PR was closed. The build artifacts in the closed-PR Actions run are still downloadable for 7 days.
