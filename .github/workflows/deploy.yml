name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Production deploy of main → root of the gh-pages branch. This branch-
# based deploy mode is REQUIRED to support per-PR subpath previews (see
# pr-preview.yml). The previous actions/deploy-pages flow couldn't
# coexist with subpath previews because GitHub Pages source is one mode
# at a time — Actions OR a branch.
#
# Repo setting required (one-time, manual): Settings → Pages → Source →
# "Deploy from a branch" → gh-pages / (root).
permissions:
  contents: write

concurrency:
  group: pages-prod
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /iris/

      # peaceiris/actions-gh-pages publishes ./dist into the root of the
      # gh-pages branch. keep_files: true preserves any existing pr-NUM/
      # subdirectories from in-flight preview deploys.
      - name: Deploy to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
