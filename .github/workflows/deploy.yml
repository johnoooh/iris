name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Modern GitHub-Actions-native Pages flow: build the static site as an
# artifact, then deploy it via actions/deploy-pages. No gh-pages branch,
# no Jekyll. Requires repo Settings → Pages → Source = "GitHub Actions".
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
